name: exchange_calculator
description: "Exchange Fiat/Crypto currencies calculator"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  flutter_riverpod: ^3.3.1
  retrofit: ^4.9.2
  dio: ^5.9.2
  json_annotation: ^4.9.0
  freezed_annotation: ^3.1.0
  either_dart: ^1.0.0
  intl: ^0.20.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  retrofit_generator: ^10.2.5
  build_runner: ^2.13.1
  json_serializable: ^6.8.0
  freezed: ^3.2.3

flutter:
  uses-material-design: true
  assets:
    - assets/fiat_currencies/
    - assets/cripto_currencies/